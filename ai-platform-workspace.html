                                            <button className="text-sm text-blue-400 hover:text-blue-300">查看全部</button>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                            {agents.map((agent, idx) => (
                                                <div key={idx} className="bg-slate-800/50 rounded-lg p-4 border border-slate-700/50 hover:border-slate-600 transition-all cursor-pointer group">
                                                    <div className="flex items-start justify-between mb-2">
                                                        <div className="w-10 h-10 rounded-lg bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center text-white">
                                                            <Icons.Bot />
                                                        </div>
                                                        <StatusBadge status={agent.status} />
                                                    </div>
                                                    <h3 className="font-medium text-slate-200 mb-1 group-hover:text-blue-400 transition-colors">{agent.name}</h3>
                                                    <p className="text-xs text-slate-500 mb-2">{agent.desc}</p>
                                                    <div className="flex items-center gap-1 text-xs text-slate-600">
                                                        <Icons.Clock />
                                                        <span>{agent.time}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* My Tasks */}
                                    <div className="bg-slate-900 rounded-xl border border-slate-800 p-5">
                                        <div className="flex items-center justify-between mb-4">
                                            <h2 className="text-lg font-semibold text-slate-100">我的任务</h2>
                                            <button className="text-sm text-blue-400 hover:text-blue-300">查看全部</button>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full">
                                                <thead>
                                                    <tr className="text-xs text-slate-500 border-b border-slate-800">
                                                        <th className="text-left pb-3 font-medium">任务名称</th>
                                                        <th className="text-left pb-3 font-medium">类型</th>
                                                        <th className="text-left pb-3 font-medium">状态</th>
                                                        <th className="text-left pb-3 font-medium">进度</th>
                                                        <th className="text-left pb-3 font-medium">开始时间</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="text-sm">
                                                    {tasks.map((task, idx) => (
                                                        <tr key={idx} className="border-b border-slate-800/50 last:border-0 hover:bg-slate-800/30 transition-colors">
                                                            <td className="py-3 text-slate-200">{task.name}</td>
                                                            <td className="py-3"><TypeBadge type={task.type} /></td>
                                                            <td className="py-3"><StatusBadge status={task.status === 'running' ? '运行中' : task.status === 'completed' ? '完成' : '排队'} /></td>
                                                            <td className="py-3">
                                                                <div className="flex items-center gap-2">
                                                                    <div className="w-20 bg-slate-800 rounded-full h-1.5">
                                                                        <div className={`h-1.5 rounded-full ${task.progress === 100 ? 'bg-blue-500' : 'progress-bar'}`} style={{width: `${task.progress}%`}}></div>
                                                                    </div>
                                                                    <span className="text-xs text-slate-500">{task.progress}%</span>
                                                                </div>
                                                            </td>
                                                            <td className="py-3 text-slate-500 text-xs">{task.time}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>

                                {/* Right Column */}
                                <div className="space-y-6">
                                    {/* My Favorites */}
                                    <div className="bg-slate-900 rounded-xl border border-slate-800 p-5">
                                        <div className="flex items-center justify-between mb-4">
                                            <h2 className="text-lg font-semibold text-slate-100">我的收藏</h2>
                                        </div>
                                        <div className="flex gap-1 mb-4 bg-slate-800/50 p-1 rounded-lg">
                                            {['models', 'datasets', 'apps'].map(tab => (
                                                <button
                                                    key={tab}
                                                    onClick={() => setActiveTab(tab)}
                                                    className={`flex-1 py-1.5 px-2 rounded text-xs font-medium transition-all ${
                                                        activeTab === tab 
                                                            ? 'bg-slate-700 text-slate-200' 
                                                            : 'text-slate-500 hover:text-slate-300'
                                                    }`}
                                                >
                                                    {tab === 'models' ? '模型' : tab === 'datasets' ? '数据集' : '应用'}
                                                </button>
                                            ))}
                                        </div>
                                        <div className="space-y-3">
                                            {(activeTab === 'models' ? favorites.models : activeTab === 'datasets' ? favorites.datasets : favorites.apps).map((item, idx) => (
                                                <div key={idx} className="flex items-center gap-3 p-3 bg-slate-800/30 rounded-lg hover:bg-slate-800/50 transition-colors cursor-pointer">
                                                    <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${
                                                        activeTab === 'models' ? 'bg-blue-500/20 text-blue-400' :
                                                        activeTab === 'datasets' ? 'bg-emerald-500/20 text-emerald-400' :
                                                        'bg-purple-500/20 text-purple-400'
                                                    }`}>
                                                        {activeTab === 'models' ? <Icons.Brain /> : activeTab === 'datasets' ? <Icons.Database /> : <Icons.Bot />}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <h4 className="text-sm font-medium text-slate-200 truncate">{item.name}</h4>
                                                        <div className="flex items-center gap-2 text-xs text-slate-500">
                                                            <span>{item.type}</span>
                                                            <span>·</span>
                                                            <span>{item.size || item.users + ' 用户'}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Recent Access */}
                                    <div className="bg-slate-900 rounded-xl border border-slate-800 p-5">
                                        <div className="flex items-center justify-between mb-4">
                                            <h2 className="text-lg font-semibold text-slate-100">最近访问</h2>
                                        </div>
                                        <div className="space-y-2">
                                            {recentAccess.map((item, idx) => (
                                                <div key={idx} className="flex items-center gap-3 p-2.5 hover:bg-slate-800/30 rounded-lg transition-colors cursor-pointer group">
                                                    <div className="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-slate-400 group-hover:text-blue-400 transition-colors">
                                                        {item.type === 'Notebook' ? <Icons.FileCode /> : 
                                                         item.type === '模型' ? <Icons.Brain /> : 
                                                         item.type === '应用' ? <Icons.Bot /> : 
                                                         item.type === '配置文件' ? <Icons.Code /> : <Icons.Bot />}
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <h4 className="text-sm text-slate-300 truncate group-hover:text-blue-400 transition-colors">{item.name}</h4>
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <TypeBadge type={item.type} />
                                                        <span className="text-xs text-slate-600">{item.time}</span>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
