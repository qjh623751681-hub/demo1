<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI平台原型导航</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #6b7280;
            margin-bottom: 32px;
        }
        .nav-grid {
            display: grid;
            gap: 16px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #e5e7eb;
            text-decoration: none;
            color: #374151;
            transition: all 0.2s;
        }
        .nav-item:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            transform: translateY(-2px);
        }
        .nav-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .nav-icon.dashboard { background: #dbeafe; }
        .nav-icon.datacenter { background: #fce7f3; }
        .nav-content h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .nav-content p {
            font-size: 13px;
            color: #6b7280;
        }
        .arrow {
            margin-left: auto;
            color: #9ca3af;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
        }
        .badge.new { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 算力调度平台</h1>
        <p class="subtitle">高保真原型预览</p>
        
        <div class="nav-grid">
            <a href="http://localhost:5173" class="nav-item">
                <div class="nav-icon dashboard">📊</div>
                <div class="nav-content">
                    <h3>工作台</h3>
                    <p>任务监控、资源概览、快捷入口</p>
                </div>
                <span class="arrow">→</span>
            </a>
            
            <a href="http://localhost:5173/?page=datacenter" class="nav-item">
                <div class="nav-icon datacenter">🗂️</div>
                <div class="nav-content">
                    <h3>数据中心 <span class="badge new">新</span></h3>
                    <p>文件管理、数据集、标注、流水线</p>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
